<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Inventory Form</title>

<style>
/* ===== BACKGROUND ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url("bg.jpg") no-repeat center center fixed;
    background-size: cover;
}

/* ===== HEADER ===== */
header {
    text-align: center;
    color: white;
    padding: 25px;
    font-size: 32px;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
}

/* ===== MAIN LAYOUT ===== */
.main {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 40px;
}

/* ===== PANELS ===== */
.panel {
    width: 420px;
    background: rgba(255,255,255,0.95);
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* ===== INPUTS ===== */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #aaa;
    font-size: 15px;
}

/* ===== BUTTONS ===== */
.btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
}

button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    color: white;
    cursor: pointer;
}

.submit { background: #2ecc71; }
.update { background: #3498db; }
.delete { background: #e74c3c; }
.display { background: #9b59b6; }
.search { background: #16a085; }
.expiry { background: #e67e22; }

/* ===== OUTPUT PANEL ===== */
#output {
    margin-top: 15px;
    padding: 15px;
    border-radius: 8px;
    background: #f4f6f7;
    display: none;
    font-size: 15px;
}

/* ===== MESSAGE ===== */
#message {
    margin-top: 10px;
    font-weight: bold;
    text-align: center;
}
</style>
</head>

<body>

<header>🛒 Product Inventory System</header>

<div class="main">

<!-- ===== LEFT INPUT PANEL ===== -->
<div class="panel">
    <h3>Product Form</h3>

    <input id="pid" placeholder="Product ID">
    <input id="pname" placeholder="Product Name">
    <input id="category" placeholder="Category">
    <input id="quantity" placeholder="Quantity">
    <input id="price" placeholder="Price">
    <input type="date" id="expiry">

    <div class="btn-group">
        <button class="submit" onclick="addProduct()">Submit</button>
        <button class="update" onclick="updateProduct()">Update</button>
        <button class="delete" onclick="deleteProduct()">Delete</button>
        <button class="display" onclick="displayProduct()">Display</button>
    </div>

    <input id="searchValue" placeholder="Search by ID or Name">

    <div class="btn-group">
        <button class="search" onclick="searchProduct()">Search</button>
        <button class="expiry" onclick="checkExpiry()">Check Expiry</button>
    </div>

    <div id="message"></div>
</div>

<!-- ===== RIGHT OUTPUT PANEL ===== -->
<div class="panel">
    <h3>Output Panel</h3>
    <div id="output"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
